name: Build Terminal Watch Face APK

on:
  push:
    branches: ["**"]
    paths:
      - "wearos-faces/**"
      - ".github/workflows/build-watchface.yml"
  workflow_dispatch:      # ← lets you trigger manually from the GitHub web UI

jobs:
  build:
    name: Assemble debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant Gradle wrapper execute permission
        working-directory: wearos-faces/xiaomi-watch2-terminal
        run: chmod +x gradlew 2>/dev/null || true
        # gradlew not committed — fall back to system gradle via wrapper download

      - name: Build debug APK
        working-directory: wearos-faces/xiaomi-watch2-terminal
        run: gradle assembleDebug --no-daemon
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminal-watchface-debug
          path: wearos-faces/xiaomi-watch2-terminal/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Print APK size
        run: |
          APK=wearos-faces/xiaomi-watch2-terminal/app/build/outputs/apk/debug/app-debug.apk
          echo "APK size: $(du -sh $APK | cut -f1)"

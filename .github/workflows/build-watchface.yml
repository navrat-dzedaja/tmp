name: Build Terminal Watch Face APK

on:
  push:
    branches: ["**"]
    paths:
      - "wearos-faces/**"
      - ".github/workflows/build-watchface.yml"
  workflow_dispatch:

jobs:
  build:
    name: Assemble debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # Pin Gradle to 8.6 to match the project's wrapper config.
      # This avoids picking up the runner's system Gradle (9.x) which
      # is incompatible with AGP 8.3.x.
      - name: Set up Gradle 8.6
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.6"

      # Generate local.properties with the runner's Android SDK path.
      # ANDROID_HOME is always set correctly on ubuntu-latest runners.
      # We do NOT touch ANDROID_SDK_ROOT — leaving both vars consistent
      # avoids the "multiple SDK paths" error from Gradle.
      - name: Write local.properties
        working-directory: wearos-faces/xiaomi-watch2-terminal
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build debug APK
        working-directory: wearos-faces/xiaomi-watch2-terminal
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminal-watchface-debug
          path: wearos-faces/xiaomi-watch2-terminal/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Print APK size
        run: |
          APK=wearos-faces/xiaomi-watch2-terminal/app/build/outputs/apk/debug/app-debug.apk
          echo "APK size: $(du -sh $APK | cut -f1)"
